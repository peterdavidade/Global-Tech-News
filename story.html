<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Affairs | Story</title>
    <link rel="stylesheet" href="story.css">
    <script src="theme.js"></script>
</head>
<body>
    <main class="story-shell">
        <div class="story-top-actions">
            <a class="story-back-link" href="index.html">Back to Home</a>
            <button type="button" class="theme-toggle" data-theme-toggle>Dark mode</button>
        </div>

        <article class="story-panel" id="storyPanel">
            <p class="story-loading">Loading story...</p>
        </article>

        <section class="story-panel related-panel">
            <div class="section-head">
                <span class="section-chip">More News</span>
                <h2>Latest stories from the desk</h2>
            </div>
            <div class="related-grid" id="relatedStories"></div>
        </section>

        <footer class="story-footer">
            <p>&copy; 2026 Global 24 News. Designed and created by Peter David Ade.</p>
        </footer>
    </main>

    <script src="newsroom-data.js"></script>
    <script src="story.js"></script>
</body>
</html>
